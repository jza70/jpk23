name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: jpk23-linux-x86_64.tar.xz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_name: jpk23-linux-aarch64.tar.xz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: jpk23-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: jpk23-macos-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: jpk23-macos-aarch64.zip

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}
        
      - name: Prepare Archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -cJf ../../../${{ matrix.archive_name }} jpk23
        
      - name: Prepare Archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          zip -j ../../../${{ matrix.archive_name }} jpk23

      - name: Prepare Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target\${{ matrix.target }}\release
          Compress-Archive -Path jpk23.exe -DestinationPath ..\..\..\${{ matrix.archive_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Flatten Artifacts
        run: |
          mkdir release_assets
          find . -maxdepth 2 -type f -name "jpk23-*" -exec cp {} release_assets/ \;
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
